services:
  # PostgreSQL Database
  - type: pserv
    name: walker-app-db
    plan: free
    databaseName: walker_app_db
    databaseUser: walker_app_user
    ipAllowList: []

  # FastAPI Backend
  - type: web
    name: walker-app-api
    env: python
    plan: starter
    buildCommand: pip install uv && unset VIRTUAL_ENV && uv sync --locked --no-dev
    startCommand: unset VIRTUAL_ENV && uv run alembic upgrade head && uv run gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: walker-app-db
          property: connectionString
      - key: PUBLIC_BASE_URL
        value: "https://ai-now.onrender.com"
      - key: CORS_ORIGINS
        value: "https://ai-now.vercel.app,http://localhost:5173"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: AGGREGATION_SERVICE_TOKEN
        generateValue: true
