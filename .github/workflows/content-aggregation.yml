name: Content Aggregation

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape-selenium-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: walker_app_api/requirements.txt

      - name: Install dependencies
        run: pip install -r walker_app_api/requirements.txt

      - name: Run Selenium scrapers and ingest
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          AGGREGATION_SERVICE_TOKEN: ${{ secrets.AGGREGATION_SERVICE_TOKEN }}
          PYTHONPATH: walker_app_api
          DATABASE_URL: "sqlite:///:memory:"
        run: python scripts/run_selenium_scrapers.py

  trigger-api-aggregation:
    runs-on: ubuntu-latest
    needs: scrape-selenium-sources
    if: ${{ !cancelled() }}

    steps:
      - name: Trigger non-Selenium aggregation on Render
        run: |
          response=$(curl -X POST "${{ secrets.BACKEND_URL }}/api/v1/aggregation/trigger" \
            -H "X-Aggregation-Token: ${{ secrets.AGGREGATION_SERVICE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"low_memory": true}' \
            -w "\n%{http_code}" \
            -s)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "Aggregation trigger failed with status $http_code"
            exit 1
          fi

      - name: Notification
        if: failure()
        run: echo "Content aggregation failed. Check the logs above."
